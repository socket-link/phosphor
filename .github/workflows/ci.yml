name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  jvm:
    name: JVM And Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew :phosphor-core:jvmTest

      - name: Check formatting
        run: ./gradlew :phosphor-core:ktlintCheck

  ios_compile:
    name: iOS Compile
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile iOS target
        run: ./gradlew :phosphor-core:compileKotlinIosArm64

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [jvm, ios_compile]
    if: ${{ always() }}

    steps:
      - name: Enforce required checks
        run: |
          if [ "${{ needs.jvm.result }}" != "success" ] || [ "${{ needs.ios_compile.result }}" != "success" ]; then
            echo "Required CI jobs did not all pass."
            exit 1
          fi
